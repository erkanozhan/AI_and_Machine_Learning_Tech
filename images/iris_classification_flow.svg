<svg xmlns="http://www.w3.org/2000/svg" width="980" height="340" viewBox="0 0 980 340" role="img" aria-labelledby="title desc">
  <title id="title">IRIS siniflandirma akisi</title>
  <desc id="desc">Etiketli veriden model secimine ve degerlendirmeye giden siniflandirma surecini gosteren cizim.</desc>
  <defs>
    <style>
      .bg { fill: #fcfbf7; }
      .box { fill: #f4efe3; stroke: #5c5248; stroke-width: 2; rx: 16; ry: 16; }
      .accent { fill: #dbe8d6; stroke: #46624b; stroke-width: 2; rx: 16; ry: 16; }
      .text { font-family: "Georgia", "Times New Roman", serif; font-size: 20px; fill: #2d2a26; }
      .small { font-size: 16px; }
      .arrow { stroke: #5c5248; stroke-width: 3; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5c5248"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="980" height="340"/>

  <rect class="box" x="30" y="95" width="180" height="110"/>
  <text class="text" x="120" y="135" text-anchor="middle">IRIS veri seti</text>
  <text class="text small" x="120" y="165" text-anchor="middle">4 ozellik</text>
  <text class="text small" x="120" y="190" text-anchor="middle">3 tur etiketi</text>

  <rect class="box" x="260" y="75" width="190" height="150"/>
  <text class="text" x="355" y="120" text-anchor="middle">Egitim / test</text>
  <text class="text small" x="355" y="150" text-anchor="middle">stratify ile</text>
  <text class="text small" x="355" y="175" text-anchor="middle">dengeli ayirma</text>
  <text class="text small" x="355" y="200" text-anchor="middle">%80 / %20</text>

  <rect class="box" x="500" y="55" width="205" height="190"/>
  <text class="text" x="602" y="100" text-anchor="middle">Model karsilastirma</text>
  <text class="text small" x="602" y="132" text-anchor="middle">10 katli capraz</text>
  <text class="text small" x="602" y="157" text-anchor="middle">dogrulama</text>
  <text class="text small" x="602" y="185" text-anchor="middle">Accuracy, Precision,</text>
  <text class="text small" x="602" y="210" text-anchor="middle">Recall, F1, Kappa</text>

  <rect class="accent" x="755" y="95" width="190" height="110"/>
  <text class="text" x="850" y="135" text-anchor="middle">Secilen model</text>
  <text class="text small" x="850" y="165" text-anchor="middle">karisiklik matrisi</text>
  <text class="text small" x="850" y="190" text-anchor="middle">sinif raporu</text>

  <path class="arrow" d="M210 150 L260 150"/>
  <path class="arrow" d="M450 150 L500 150"/>
  <path class="arrow" d="M705 150 L755 150"/>
</svg>
